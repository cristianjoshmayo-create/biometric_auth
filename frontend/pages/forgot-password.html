<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center p-4">

    <div class="bg-gray-900 rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-6">
            <div class="text-4xl mb-3">🔑</div>
            <h1 class="text-white text-2xl font-bold">Forgot Password</h1>
            <p class="text-gray-400 text-sm mt-1">
                We'll email you a reset link. You'll still need to pass a biometric challenge before changing your password.
            </p>
        </div>

        <div id="input-section">
            <label class="text-gray-300 text-sm font-medium block mb-2">Email Address</label>
            <input
                id="email-input"
                type="email"
                placeholder="Enter your account email"
                onkeydown="if(event.key==='Enter') submitForgot()"
                class="w-full bg-gray-800 text-white rounded-lg px-4 py-3 mb-4
                       outline-none focus:ring-2 focus:ring-purple-500 border border-gray-700"
            />
            <p id="status-msg" class="text-center text-sm mb-4 text-gray-500"></p>
            <button
                id="send-btn"
                onclick="submitForgot()"
                class="w-full bg-purple-600 hover:bg-purple-700 text-white
                       font-semibold py-3 rounded-lg transition-colors duration-200"
            >
                Send Reset Link
            </button>
        </div>

        <div id="sent-section" class="hidden text-center">
            <div class="text-5xl mb-3">📧</div>
            <h2 class="text-white text-lg font-semibold mb-2">Check your email</h2>
            <p id="sent-detail" class="text-gray-400 text-sm mb-4"></p>
            <p class="text-gray-500 text-xs mb-4">
                Link expires in 15 minutes. Check your spam folder if you don't see it.
            </p>
        </div>

        <p class="text-center text-gray-500 text-sm mt-6">
            <a href="/static/pages/login.html" class="text-purple-400 hover:underline">Back to login</a>
        </p>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        async function submitForgot() {
            const email = document.getElementById("email-input").value.trim().toLowerCase();
            const status = document.getElementById("status-msg");
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                status.textContent = "❌ Please enter a valid email address.";
                status.className = "text-center text-sm mb-4 text-red-400";
                return;
            }
            status.textContent = "⏳ Sending...";
            status.className = "text-center text-sm mb-4 text-yellow-400";
            document.getElementById("send-btn").disabled = true;
            try {
                const res = await Api.forgotPassword(email);
                document.getElementById("input-section").classList.add("hidden");
                document.getElementById("sent-detail").textContent =
                    res.message || `If an account exists for ${email}, a reset link has been sent.`;
                document.getElementById("sent-section").classList.remove("hidden");
            } catch (err) {
                status.textContent = "❌ Network error. Try again.";
                status.className = "text-center text-sm mb-4 text-red-400";
                document.getElementById("send-btn").disabled = false;
            }
        }
    </script>
</body>
</html>
