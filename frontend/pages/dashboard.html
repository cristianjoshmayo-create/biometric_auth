<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center p-4">

    <div class="bg-gray-900 rounded-2xl shadow-2xl w-full max-w-md p-8 text-center">

        <div class="text-6xl mb-4">🏠</div>
        <h1 class="text-white text-2xl font-bold mb-2">Welcome!</h1>
        <p class="text-gray-400 text-sm mb-8">
            You have been successfully authenticated.
        </p>

        <div class="bg-gray-800 rounded-lg p-4 mb-6 border border-gray-700">
            <p class="text-green-400 text-sm font-semibold">
                ✅ Session Active
            </p>
            <p class="text-gray-400 text-xs mt-1">
                Continuous authentication is monitoring your session
            </p>
        </div>

        <a href="/static/pages/login.html"
           class="block w-full bg-red-600 hover:bg-red-700 text-white
                  font-semibold py-3 rounded-lg transition-colors duration-200">
            Logout
        </a>

    </div>

</body>
</html>
