<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimodal Auth | Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode:"class",
        theme:{ extend:{
          fontFamily:{ headline:["Inter","sans-serif"], body:["Inter","sans-serif"], mono:["JetBrains Mono","monospace"] },
          borderRadius:{ DEFAULT:"0.5rem", lg:"0.5rem", xl:"1.5rem", full:"9999px" }
        }}
      }
    </script>
    <style>
      :root {
        --color-background:#f9f9ff; --color-surface:#f9f9ff;
        --color-surface-container-lowest:#ffffff; --color-surface-container-low:#f1f3ff;
        --color-surface-container:#e9edff; --color-surface-container-high:#e1e8fd;
        --color-surface-container-highest:#dce2f7;
        --color-on-surface:#141b2b; --color-on-surface-variant:#434655;
        --color-outline:#737686; --color-outline-variant:#c3c6d7;
        --color-primary:#004ac6; --color-on-primary:#ffffff;
        --color-primary-container:#2563eb; --color-on-primary-container:#eeefff;
        --color-error:#ba1a1a; --color-error-container:#ffdad6; --color-on-error-container:#93000a;
        --navbar-bg:#ffffff;
        --card-shadow:0 32px 64px -12px rgba(20,27,43,0.06);
      }
      .dark {
        --color-background:#111827; --color-surface:#111827;
        --color-surface-container-lowest:#0d1117; --color-surface-container-low:#161e2e;
        --color-surface-container:#1a2235; --color-surface-container-high:#1f2a3e;
        --color-surface-container-highest:#243148;
        --color-on-surface:#e2e6f8; --color-on-surface-variant:#a8adc5;
        --color-outline:#6b7090; --color-outline-variant:#2e3550;
        --color-primary:#93b4ff; --color-on-primary:#002882;
        --color-primary-container:#3d70f0; --color-on-primary-container:#dce8ff;
        --navbar-bg:#0d1117;
        --card-shadow:0 32px 64px -12px rgba(0,0,0,0.4);
      }
      body { background-color:var(--color-surface-container-low); color:var(--color-on-surface); font-family:Inter,sans-serif; }
      .design-card { background:var(--color-surface-container-lowest); border:1px solid color-mix(in srgb,var(--color-outline-variant) 15%,transparent); box-shadow:var(--card-shadow); }
      .signature-gradient { background:linear-gradient(135deg,#004ac6 0%,#2563eb 100%); }
      .text-on-surface { color:var(--color-on-surface); }
      .text-on-surface-variant { color:var(--color-on-surface-variant); }
      .text-primary { color:var(--color-primary); }
      .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
      *, *::before, *::after { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease; }
      .action-row { background:var(--color-surface-container-low); color:var(--color-on-surface); }
      .action-row:hover { filter:brightness(0.97); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<!-- Navbar -->
<nav class="w-full top-0 flex justify-between items-center px-6 py-4 z-50 sticky shadow-[0_1px_0_rgba(20,27,43,0.04)]" style="background:var(--navbar-bg);">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 signature-gradient rounded-lg flex items-center justify-center">
      <span class="material-symbols-outlined text-white text-sm" style="font-variation-settings:'FILL' 1;">security</span>
    </div>
    <span class="text-xl font-semibold tracking-tight text-primary">Multimodal Auth</span>
  </div>
  <div class="flex items-center gap-3">
    <button onclick="toggleDark()" id="theme-btn" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors active:scale-95">
      <span id="theme-icon" class="material-symbols-outlined" style="color:var(--color-on-surface-variant);">dark_mode</span>
    </button>
  </div>
</nav>

<!-- Secondary nav -->
<div class="w-full border-b px-6 py-2 flex items-center gap-8"
     style="background:var(--color-surface-container-lowest);border-color:color-mix(in srgb,var(--color-outline-variant) 20%,transparent);">
    <a class="text-sm font-semibold border-b-2 pb-2 -mb-2 cursor-pointer text-primary" style="border-color:var(--color-primary);">Dashboard</a>
</div>

<main class="flex-grow p-6">
<div class="max-w-5xl mx-auto space-y-6">

  <!-- Hero welcome row -->
  <div class="design-card rounded-xl p-6 flex items-center gap-5">
    <div class="p-4 rounded-full" style="background:color-mix(in srgb,var(--color-primary-container) 12%,transparent);">
      <span class="material-symbols-outlined text-3xl text-primary" style="font-variation-settings:'FILL' 1;">home</span>
    </div>
    <div class="flex-1 min-w-0">
      <h1 class="text-2xl font-semibold tracking-tight text-on-surface mb-1">Welcome back</h1>
      <p id="user-email" class="text-sm font-mono text-primary truncate">—</p>
    </div>
  </div>

  <!-- Action cards row -->
  <div class="grid md:grid-cols-2 gap-6">

    <!-- Profile / Account -->
    <div class="design-card rounded-xl p-6">
      <h2 class="text-on-surface font-semibold mb-1 flex items-center gap-2">
        <span class="material-symbols-outlined text-base text-primary">manage_accounts</span>
        Profile &amp; Account
      </h2>
      <p class="text-on-surface-variant text-xs mb-4">Strong re-auth required (keystroke + voice).</p>
      <div class="space-y-2">
        <button data-action="change-password"
                class="action-row w-full text-left text-sm px-4 py-3 rounded-lg flex items-center gap-3 transition-colors">
          <span class="material-symbols-outlined text-base text-primary">key</span>
          Change password
          <span class="ml-auto material-symbols-outlined text-base" style="color:var(--color-outline);">chevron_right</span>
        </button>
        <button data-action="update-security-question"
                class="action-row w-full text-left text-sm px-4 py-3 rounded-lg flex items-center gap-3 transition-colors">
          <span class="material-symbols-outlined text-base text-primary">help</span>
          Update security question
          <span class="ml-auto material-symbols-outlined text-base" style="color:var(--color-outline);">chevron_right</span>
        </button>
        <button data-action="re-record-voice"
                class="action-row w-full text-left text-sm px-4 py-3 rounded-lg flex items-center gap-3 transition-colors">
          <span class="material-symbols-outlined text-base text-primary">mic</span>
          Re-record voice sample
          <span class="ml-auto material-symbols-outlined text-base" style="color:var(--color-outline);">chevron_right</span>
        </button>
      </div>
    </div>

    <!-- Sensitive info -->
    <div class="design-card rounded-xl p-6">
      <h2 class="text-on-surface font-semibold mb-1 flex items-center gap-2">
        <span class="material-symbols-outlined text-base text-primary">visibility</span>
        Sensitive Info
      </h2>
      <p class="text-on-surface-variant text-xs mb-4">Light re-auth (keystroke only).</p>
      <div class="space-y-2">
        <button data-action="show-phrase"
                class="action-row w-full text-left text-sm px-4 py-3 rounded-lg flex items-center gap-3 transition-colors">
          <span class="material-symbols-outlined text-base text-primary">vpn_key</span>
          <span id="phrase-label">Show my enrolled phrase</span>
          <span class="ml-auto material-symbols-outlined text-base" style="color:var(--color-outline);">chevron_right</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Bottom row: logout -->
  <div class="flex items-center justify-end gap-4 flex-wrap">
    <a href="/static/pages/login.html" onclick="sessionStorage.clear()"
       class="px-5 py-2.5 font-semibold text-sm rounded-lg flex items-center gap-2 transition-all hover:opacity-90 active:scale-[0.98]"
       style="background:var(--color-error-container);color:var(--color-on-error-container);">
      <span class="material-symbols-outlined text-base">logout</span>
      Logout
    </a>
  </div>
</div>
</main>

<script src="/static/js/api.js"></script>

<script>
function toggleDark() {
    const html = document.documentElement;
    html.classList.toggle('dark');
    const isDark = html.classList.contains('dark');
    document.getElementById('theme-icon').textContent = isDark ? 'light_mode' : 'dark_mode';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.classList.add('dark');
    document.documentElement.classList.remove('light');
    document.addEventListener('DOMContentLoaded', () => {
      const icon = document.getElementById('theme-icon');
      if (icon) icon.textContent = 'light_mode';
    });
}

// ─── Session bootstrap ───────────────────────────────────────────────────────
// Preview mode (?preview=1) — populate fake session so the dashboard renders
// without a real login. Used by preview.html for design review.
const isPreview = new URLSearchParams(location.search).get('preview') === '1';
if (isPreview) {
    sessionStorage.setItem('authUsername', 'preview@multimodal-auth.com');
    sessionStorage.setItem('authLoginAt', Date.now().toString());
}
const authUsername = sessionStorage.getItem("authUsername");
if (!authUsername) {
    window.location.href = "/static/pages/login.html";
}
const emailEl = document.getElementById("user-email");
if (emailEl) emailEl.textContent = authUsername || "";

// ─── Action buttons ──────────────────────────────────────────────────────────
// These re-auth flows aren't built yet — placeholders for now.
document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
        alert("This action isn't wired up yet.");
    });
});
</script>

</body>
</html>
